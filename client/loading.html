<!DOCTYPE html>
<html>
<head>
<title>Suroi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<style>
body {
  background-color: black;
  font-family: 'Roboto', sans-serif; 
  font-weight: 100;
}
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100vh; 
}

.svg-container {
  display: inline-block; 
}

.rotating {
  animation: rotate 2.5s linear infinite; 
}
.text {
  color: hsl(189, 34%, 42%);        /* Set text color */
  margin-top: 50px;       /* Adjust spacing between SVG and text */
}


@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

</style>
</head>
<body>

<div class="container">
  <div class="svg-container">
    <img src="public/img/logos/suroi_favicon.svg" alt="Suroi Logo" width="250" height="250" class="rotating" style="margin-top: 200px;"> 
  </div>

  <div class="svg-container">
    <img src="public/img/logos/suroi.svg" alt="Suroi Title Text" width="300" height="300" style="margin-top: -75px;"> 
  </div>

  <div class="text" style="margin-top: 120px;">MADE POSSIBLE BY</div> 

  <div class="svg-container">
    <img src="public/img/logos/electron.svg" alt="Electron Logo" width="300" height="300" style="margin-top: -120px;">> 
  </div>


</div>
</body>
</html>
